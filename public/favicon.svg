<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="38%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#1a2a50"/>
      <stop offset="100%" stop-color="#060912"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="45%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="5%" r="65%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cc">
      <circle cx="16" cy="16" r="14.5"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="16.3" cy="16.4" r="14" fill="rgba(0,0,0,0.3)"/>
  <!-- Background -->
  <circle cx="16" cy="16" r="14.5" fill="url(#bg)"/>
  <!-- Ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="13.2" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.3"/>

  <!-- Tick marks -->
  <line x1="16" y1="1.5" x2="16" y2="3.5" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="30.5" y1="16" x2="28.5" y2="16" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="16" y1="30.5" x2="16" y2="28.5" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="1.5" y1="16" x2="3.5" y2="16" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
  <line x1="23.75" y1="3.25" x2="22.7" y2="5" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="28.75" y1="8.25" x2="27" y2="9.3" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="28.75" y1="23.75" x2="27" y2="22.7" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="23.75" y1="28.75" x2="22.7" y2="27" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="8.25" y1="3.25" x2="9.3" y2="5" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="3.25" y1="8.25" x2="5" y2="9.3" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="3.25" y1="23.75" x2="5" y2="22.7" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>
  <line x1="8.25" y1="28.75" x2="9.3" y2="27" stroke="#1d4ed8" stroke-width="0.7" opacity="0.4"/>

  <!-- Top glow -->
  <ellipse cx="16" cy="5" rx="11" ry="7" fill="url(#glow)" clip-path="url(#cc)"/>

  <!-- Electrodes -->
  <line x1="12.5" y1="4.5" x2="14.2" y2="12.5" stroke="#2d3f5a" stroke-width="1" stroke-linecap="round"/>
  <line x1="12.2" y1="3.2" x2="12.8" y2="5" stroke="#4a5f7a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="4.5" x2="17.8" y2="12.5" stroke="#2d3f5a" stroke-width="1" stroke-linecap="round"/>
  <line x1="19.8" y1="3.2" x2="19.2" y2="5" stroke="#4a5f7a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Weld arc -->
  <path d="M13.8,12.5 L14.8,10.5 L15.7,12.5 L16.2,10 L17.1,12.5 L18,10.5 L19.2,12.5"
    stroke="#00e5ff" stroke-width="0.95" fill="none" stroke-linejoin="round" opacity="0.95"/>
  <path d="M13.8,12.5 L14.8,10.5 L15.7,12.5 L16.2,10 L17.1,12.5 L18,10.5 L19.2,12.5"
    stroke="#ffffff" stroke-width="0.4" fill="none" stroke-linejoin="round" opacity="0.7"/>

  <!-- Arc glow dot -->
  <circle cx="16" cy="9.5" r="0.8" fill="#00e5ff" opacity="0.85"/>
  <circle cx="14.5" cy="11" r="0.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="17.5" cy="11" r="0.5" fill="#00e5ff" opacity="0.5"/>

  <!-- EWU text -->
  <text x="16" y="21.5" text-anchor="middle"
    font-family="'Arial Black',Arial,sans-serif"
    font-weight="900" font-size="8"
    fill="#ffffff" opacity="0.95" letter-spacing="-0.2">EWU</text>

  <!-- Bottom divider -->
  <line x1="9" y1="24.5" x2="13.5" y2="24.5" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
  <circle cx="16" cy="24.5" r="0.6" fill="#00e5ff" opacity="0.65"/>
  <line x1="18.5" y1="24.5" x2="23" y2="24.5" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
</svg>
